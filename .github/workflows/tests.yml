name: Tests

on:
  pull_request:
    branches: ["master"]
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run tests
        run: dotnet test NetlifyDnsManager.Tests/NetlifyDnsManager.Tests.csproj --filter "FullyQualifiedName~ClientsConfiguration|FullyQualifiedName~ClientAuthValidation|FullyQualifiedName~DnsUpdateService|FullyQualifiedName~DnsUpdateEndpointAuthorization|FullyQualifiedName~ClientWorkerIpCaching" -c Release -v:detailed --consoleLoggerParameters:ErrorsOnly
